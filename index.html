<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>E-MotoPrix Social</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
    }

    /* Variabel CSS untuk dark & light mode */
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #111111;
      --bg-card: rgba(20, 20, 20, 0.7);
      --text-primary: #f0f0f0;
      --text-secondary: #b0b0b0;
      --accent: #00e676;
      --accent-glow: rgba(0, 230, 118, 0.3);
      --border-color: #2a2a2a;
      --shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.5);
      --transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    body.light {
      --bg-primary: #f5f5f7;
      --bg-secondary: #ffffff;
      --bg-card: rgba(255, 255, 255, 0.85);
      --text-primary: #111111;
      --text-secondary: #444444;
      --accent: #00994d;
      --accent-glow: rgba(0, 153, 77, 0.2);
      --border-color: #e0e0e0;
      --shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s ease, color 0.2s ease;
      padding: 1.5rem;
    }

    /* container utama */
    .container {
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }

    /* header dengan toggle */
    .header {
      text-align: center;
      margin-bottom: 3.5rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-card);
      backdrop-filter: blur(10px);
      padding: 0.5rem 1.2rem;
      border-radius: 60px;
      border: 1px solid var(--border-color);
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.4; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.2); }
    }

    h1 {
      font-size: 3.2rem;
      font-weight: 700;
      letter-spacing: -1px;
      background: linear-gradient(135deg, var(--text-primary), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }

    .sub {
      color: var(--text-secondary);
      font-size: 1rem;
    }

    /* toggle bar (mode + language) */
    .toggle-bar {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }

    .toggle-btn {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      color: var(--text-primary);
      backdrop-filter: blur(4px);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-btn:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 5px 12px var(--accent-glow);
    }

    .toggle-btn.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }

    /* grid tombol sosial */
    .social-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2rem;
      margin: 3rem 0 2rem;
    }

    /* card modern dengan efek glass */
    .social-card {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 2rem 2rem 2.2rem;
      width: 280px;
      text-align: center;
      transition: var(--transition);
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow);
      cursor: pointer;
    }

    .social-card:hover {
      transform: translateY(-12px);
      border-color: var(--accent);
      box-shadow: 0 30px 40px -15px var(--accent-glow);
    }

    .icon-circle {
      width: 100px;
      height: 100px;
      margin: 0 auto 1.2rem;
      background: linear-gradient(145deg, var(--bg-secondary), var(--bg-primary));
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 2rem;
      font-size: 3.2rem;
      transition: 0.2s;
      border: 1px solid var(--border-color);
    }

    .social-card:hover .icon-circle {
      transform: scale(1.02);
      border-color: var(--accent);
    }

    .platform-name {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .action-text {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-top: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .arrow {
      transition: transform 0.2s;
    }

    .social-card:hover .arrow {
      transform: translateX(5px);
    }

    /* footer kecil */
    .footer-note {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 3rem;
      opacity: 0.7;
    }

    /* responsif */
    @media (max-width: 700px) {
      h1 {
        font-size: 2.4rem;
      }
      .social-grid {
        gap: 1.2rem;
      }
      .social-card {
        width: 250px;
        padding: 1.5rem;
      }
      .icon-circle {
        width: 80px;
        height: 80px;
        font-size: 2.6rem;
      }
    }

    /* animasi masuk */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .social-card {
      animation: fadeUp 0.5s ease forwards;
      opacity: 0;
    }

    .social-card:nth-child(1) { animation-delay: 0.1s; }
    .social-card:nth-child(2) { animation-delay: 0.2s; }
    .social-card:nth-child(3) { animation-delay: 0.3s; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="badge">
      <span class="dot"></span>
      <span id="liveBadge">● LIVE E-MotoPrix</span>
    </div>
    <h1 id="mainTitle">E-Motoprix<span style="color:var(--accent)">.link</span></h1>
    <p class="sub" id="subtitle">connect instantly — modern & minimal</p>

    <div class="toggle-bar">
      <!-- Toggle Dark/Light Mode -->
      <button class="toggle-btn" id="themeToggle">
        <span>🌓</span> <span id="themeText">Dark</span>
      </button>
      <!-- Toggle Bahasa -->
      <button class="toggle-btn" id="langToggle">
        <span>🌐</span> <span id="langText">ID / EN</span>
      </button>
    </div>
  </div>

  <div class="social-grid">
    <!-- TikTok Card -->
    <div class="social-card" data-platform="tiktok">
      <div class="icon-circle">🎵</div>
      <div class="platform-name">TikTok</div>
      <div class="action-text">
        <span id="tiktokText">buka sekarang</span>
        <span class="arrow">→</span>
      </div>
    </div>

    <!-- Instagram Card -->
    <div class="social-card" data-platform="instagram">
      <div class="icon-circle">📸</div>
      <div class="platform-name">Instagram</div>
      <div class="action-text">
        <span id="instagramText">buka sekarang</span>
        <span class="arrow">→</span>
      </div>
    </div>

    <!-- Discord Card -->
    <div class="social-card" data-platform="discord">
      <div class="icon-circle">💬</div>
      <div class="platform-name">Discord</div>
      <div class="action-text">
        <span id="discordText">buka sekarang</span>
        <span class="arrow">→</span>
      </div>
    </div>
  </div>
  <div class="footer-note" id="footerNote">klik kartu untuk membuka platform →</div>
</div>

<script>
  // ---------- DATA MULTI BAHASA (Indonesia & Inggris) ----------
  const texts = {
    id: {
      liveBadge: "● LIVE social hub",
      mainTitle: "social<span style='color:var(--accent)'>.link</span>",
      subtitle: "terhubung secara instan — modern & minimal",
      themeLabel: "Mode",
      langLabel: "ID / EN",
      tiktok: "buka TikTok",
      instagram: "buka Instagram",
      discord: "buka Discord",
      footer: "klik kartu untuk membuka platform →",
      themeDark: "Gelap",
      themeLight: "Terang"
    },
    en: {
      liveBadge: "● LIVE social hub",
      mainTitle: "social<span style='color:var(--accent)'>.link</span>",
      subtitle: "connect instantly — modern & minimal",
      themeLabel: "Theme",
      langLabel: "ID / EN",
      tiktok: "open TikTok",
      instagram: "open Instagram",
      discord: "open Discord",
      footer: "click card to open platform →",
      themeDark: "Dark",
      themeLight: "Light"
    }
  };

  // State saat ini
  let currentLang = 'id';     // 'id' atau 'en'
  let currentTheme = 'dark';   // 'dark' atau 'light'

  // Elemen yang perlu diupdate saat ganti bahasa
  const liveBadgeSpan = document.getElementById('liveBadge');
  const mainTitleEl = document.getElementById('mainTitle');
  const subtitleEl = document.getElementById('subtitle');
  const tiktokTextSpan = document.getElementById('tiktokText');
  const instagramTextSpan = document.getElementById('instagramText');
  const discordTextSpan = document.getElementById('discordText');
  const footerNoteSpan = document.getElementById('footerNote');
  const themeToggleSpan = document.getElementById('themeText');
  const langToggleSpan = document.getElementById('langText');

  // Fungsi update UI berdasarkan bahasa
  function updateLanguage() {
    const t = texts[currentLang];
    liveBadgeSpan.innerText = t.liveBadge;
    // mainTitle mengandung HTML, gunakan innerHTML
    mainTitleEl.innerHTML = t.mainTitle;
    subtitleEl.innerText = t.subtitle;
    tiktokTextSpan.innerText = t.tiktok;
    instagramTextSpan.innerText = t.instagram;
    discordTextSpan.innerText = t.discord;
    footerNoteSpan.innerText = t.footer;
    // untuk tombol tema dan bahasa (teks statis)
    if (currentLang === 'id') {
      langToggleSpan.innerText = "ID / EN";
    } else {
      langToggleSpan.innerText = "ID / EN";
    }
    // Update text tema sesuai bahasa dan mode saat ini
    updateThemeButtonText();
  }

  function updateThemeButtonText() {
    const t = texts[currentLang];
    if (currentTheme === 'dark') {
      themeToggleSpan.innerText = currentLang === 'id' ? 'Gelap' : 'Dark';
    } else {
      themeToggleSpan.innerText = currentLang === 'id' ? 'Terang' : 'Light';
    }
  }

  // Fungsi ganti tema (dark/light)
  function setTheme(theme) {
    currentTheme = theme;
    if (theme === 'dark') {
      document.body.classList.remove('light');
    } else {
      document.body.classList.add('light');
    }
    updateThemeButtonText();
  }

  function toggleTheme() {
    if (currentTheme === 'dark') {
      setTheme('light');
    } else {
      setTheme('dark');
    }
  }

  // Fungsi ganti bahasa
  function toggleLanguage() {
    currentLang = currentLang === 'id' ? 'en' : 'id';
    updateLanguage();
  }

  // Event listener untuk tombol
  document.getElementById('themeToggle').addEventListener('click', toggleTheme);
  document.getElementById('langToggle').addEventListener('click', toggleLanguage);

  // ----- INTERAKSI KARTU: membuka link ke platform resmi (dengan efek modern) -----
  const platforms = {
    tiktok: 'https://www.tiktok.com/@emotoprix_official?_r=1&_t=ZS-96PVvSDwLES',
    instagram: 'https://www.instagram.com',
    discord: 'https://discord.gg/ZgNpUH5Pb'
  };

  // Fungsi notifikasi kecil (toast modern)
  function showToast(message, isError = false) {
    let toast = document.getElementById('customToast');
    if (!toast) {
      toast = document.createElement('div');
      toast.id = 'customToast';
      toast.style.position = 'fixed';
      toast.style.bottom = '25px';
      toast.style.left = '50%';
      toast.style.transform = 'translateX(-50%)';
      toast.style.backgroundColor = currentTheme === 'dark' ? '#1e1e1e' : '#ffffff';
      toast.style.color = currentTheme === 'dark' ? '#e0e0e0' : '#111111';
      toast.style.backdropFilter = 'blur(16px)';
      toast.style.padding = '10px 24px';
      toast.style.borderRadius = '50px';
      toast.style.fontSize = '0.85rem';
      toast.style.fontWeight = '500';
      toast.style.border = `1px solid ${currentTheme === 'dark' ? '#333' : '#ccc'}`;
      toast.style.boxShadow = '0 10px 25px rgba(0,0,0,0.2)';
      toast.style.zIndex = '1000';
      toast.style.fontFamily = 'inherit';
      toast.style.pointerEvents = 'none';
      document.body.appendChild(toast);
    }
    // update warna border sesuai aksen
    toast.style.borderLeft = `3px solid var(--accent)`;
    toast.innerText = message;
    toast.style.opacity = '1';
    clearTimeout(window.toastTimeout);
    window.toastTimeout = setTimeout(() => {
      toast.style.opacity = '0';
    }, 1800);
  }

  // Tambahkan event click ke setiap card
  document.querySelectorAll('.social-card').forEach(card => {
    card.addEventListener('click', (e) => {
      const platform = card.getAttribute('data-platform');
      if (platform && platforms[platform]) {
        // Efek click: sedikit shrink lalu kembali
        card.style.transform = 'scale(0.97)';
        setTimeout(() => {
          card.style.transform = '';
        }, 120);
        // Buka link di tab baru
        window.open(platforms[platform], '_blank');
        // Toast notifikasi dengan bahasa aktif
        const t = texts[currentLang];
        let msg = '';
        if (platform === 'tiktok') msg = `TikTok → ${t.tiktok}`;
        else if (platform === 'instagram') msg = `Instagram → ${t.instagram}`;
        else msg = `Discord → ${t.discord}`;
        showToast(msg);
      }
    });
  });

  // inisialisasi awal: set dark mode, bahasa id
  setTheme('dark');
  currentLang = 'id';
  updateLanguage();

  // efek hover tambahan pada tombol toggle (active state)
  // perbaiki theme button text saat theme berubah karena dark/light
  window.addEventListener('load', () => {
    // sedikit efek tambahan: menyesuaikan warna toast jika theme berubah dinamis
    const observer = new MutationObserver(() => {
      const toast = document.getElementById('customToast');
      if (toast) {
        toast.style.backgroundColor = currentTheme === 'dark' ? '#1e1e1e' : '#ffffff';
        toast.style.color = currentTheme === 'dark' ? '#e0e0e0' : '#111111';
        toast.style.border = `1px solid ${currentTheme === 'dark' ? '#333' : '#ccc'}`;
      }
    });
    observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });
  });
</script>
</body>
</html>
